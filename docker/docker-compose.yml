# ===================================
# A股自选股智能分析系统 - Docker Compose
# ===================================
#
# 使用方式:
#   定时模式: docker-compose -f ./docker/docker-compose.yml up -d
#   FastAPI模式: docker-compose -f ./docker/docker-compose.yml up -d server
#   同时启动: docker-compose -f ./docker/docker-compose.yml up -d analyzer server

name: daily-stock-analysis
version: '3.8'

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped

  # 环境变量（从 .env 文件加载）
  env_file:
    - ../.env

  environment:
    - TZ=Asia/Shanghai

  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../.env:/app/.env
    - ../strategies:/app/strategies:ro
    # 源代码挂载 - 修改代码后重启容器即可生效
    - ../src:/app/src:ro
    - ../main.py:/app/main.py:ro
    - ../analyzer_service.py:/app/analyzer_service.py:ro
    - ../server.py:/app/server.py:ro
    - ../webui.py:/app/webui.py:ro
    - ../data_provider:/app/data_provider:ro
    - ../templates:/app/templates:ro
    - ../api:/app/api:ro
    - ../bot:/app/bot:ro
    - ../scripts:/app/scripts:ro
    - ../patch:/app/patch:ro
    - ../sources:/app/sources:ro

  # 代理设置（如果需要）
  # environment:
  #   - http_proxy=http://host.docker.internal:10809
  #   - https_proxy=http://host.docker.internal:10809

  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

  # 资源限制
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

services:
  # 定时任务模式（需设置 SCHEDULE_ENABLED=true）
  analyzer:
    <<: *common
    container_name: stock-analyzer
    command: ["python", "main.py", "--schedule"]

  # FastAPI 模式
  server:
    <<: *common
    container_name: stock-server
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
